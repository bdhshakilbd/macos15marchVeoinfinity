workflows:
  # iOS Build Workflow
  ios-workflow:
    name: iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        # App identifiers
        BUNDLE_ID: "com.bdhshakil.veo3" # Unique bundle ID
        APP_NAME: "Veo3 Another"
    
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      
      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;
      
      - name: Build iOS (unsigned for testing)
        script: |
          flutter build ios --release --no-codesign
      
      # Uncomment for signed build (requires certificates in Codemagic UI)
      # - name: Build signed iOS IPA
      #   script: |
      #     flutter build ipa --release
    
    artifacts:
      - build/ios/iphoneos/*.app
      - build/ios/ipa/*.ipa
    
    publishing:
      email:
        recipients:
          - bdhshakilbd@gmail.com
        notify:
          success: true
          failure: true

  # macOS Build Workflow
  macos-workflow:
    name: macOS Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      node: 18
      cocoapods: default
      vars:
        APP_NAME: "Veo3 Another"
    
    scripts:
      - name: Fetch Git LFS files
        script: |
          git lfs install
          git lfs pull
          echo "=== LFS files fetched ==="
          ls -lah ffmpeg_macos/ 2>/dev/null || echo "ffmpeg_macos dir not found"
      
      - name: Enable macOS desktop support
        script: |
          flutter config --enable-macos-desktop
      
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      
      - name: Build macOS app
        script: |
          flutter build macos --release
      
      - name: Bundle Playwright server into app
        script: |
          APP_PATH="build/macos/Build/Products/Release/veo3_another.app"
          PW_DIR="$APP_PATH/Contents/Resources/playwright_server"
          mkdir -p "$PW_DIR"
          
          # Copy pre-built binaries (both architectures)
          cp playwright_server/playwright_server_macos_arm64 "$PW_DIR/playwright_server_macos_arm64"
          cp playwright_server/playwright_server_macos_x64 "$PW_DIR/playwright_server_macos_x64"
          
          chmod +x "$PW_DIR"/*
          # Remove quarantine flag so Gatekeeper doesn't block on first run
          xattr -cr "$PW_DIR"/*
          echo "Bundled Playwright server:"
          ls -lah "$PW_DIR"/

      - name: Bundle FFmpeg into app
        script: |
          APP_PATH="build/macos/Build/Products/Release/veo3_another.app"
          MACOS_DIR="$APP_PATH/Contents/MacOS"
          
          echo "=== Bundling FFmpeg binaries ==="
          echo "Repo files:"
          ls -lah ffmpeg_macos/
          
          cp ffmpeg_macos/ffmpeg "$MACOS_DIR/ffmpeg"
          cp ffmpeg_macos/ffprobe "$MACOS_DIR/ffprobe"
          
          chmod +x "$MACOS_DIR/ffmpeg" "$MACOS_DIR/ffprobe"
          xattr -cr "$MACOS_DIR/ffmpeg" "$MACOS_DIR/ffprobe" 2>/dev/null || true
          
          echo "=== FFmpeg in app bundle ==="
          ls -lah "$MACOS_DIR/ffmpeg" "$MACOS_DIR/ffprobe"

      - name: Rename and package app
        script: |
          cd build/macos/Build/Products/Release
          if [ -d "veo3_another.app" ]; then
            mv veo3_another.app "$APP_NAME.app"
          fi
          zip -r -y "$APP_NAME.zip" "$APP_NAME.app"
    
    artifacts:
      - build/macos/Build/Products/Release/*.app
      - build/macos/Build/Products/Release/*.zip
    
    publishing:
      email:
        recipients:
          - bdhshakilbd@gmail.com
        notify:
          success: true
          failure: true

  # Combined iOS + macOS Build (runs both)
  all-platforms:
    name: Build iOS + macOS
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.yourcompany.veo3another"
        APP_NAME: "Veo3 Another"
    
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      
      # iOS Build
      - name: Install iOS CocoaPods
        script: |
          find . -name "Podfile" -execdir pod install \;
      
      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
      
      # macOS Build
      - name: Enable macOS support
        script: |
          flutter config --enable-macos-desktop
      
      - name: Build macOS
        script: |
          flutter build macos --release
      
      - name: Package macOS
        script: |
          cd build/macos/Build/Products/Release
          mv veo3_another.app "$APP_NAME.app" || true
          zip -r "$APP_NAME-macOS.zip" "$APP_NAME.app"
    
    artifacts:
      - build/ios/iphoneos/*.app
      - build/macos/Build/Products/Release/*.app
      - build/macos/Build/Products/Release/*.zip
    
    publishing:
      email:
        recipients:
          - bdhshakilbd@gmail.com
        notify:
          success: true
          failure: true
