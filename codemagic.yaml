workflows:
  # iOS Build Workflow
  ios-workflow:
    name: iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        # App identifiers
        BUNDLE_ID: "com.bdhshakil.veo3" # Unique bundle ID
        APP_NAME: "Veo3 Another"
    
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      
      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;
      
      - name: Build iOS (unsigned for testing)
        script: |
          flutter build ios --release --no-codesign
      
      # Uncomment for signed build (requires certificates in Codemagic UI)
      # - name: Build signed iOS IPA
      #   script: |
      #     flutter build ipa --release
    
    artifacts:
      - build/ios/iphoneos/*.app
      - build/ios/ipa/*.ipa
    
    publishing:
      email:
        recipients:
          - bdhshakilbd@gmail.com
        notify:
          success: true
          failure: true

  # macOS Build Workflow
  macos-workflow:
    name: macOS Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      node: 18
      cocoapods: default
      vars:
        APP_NAME: "Veo3 Another"
    
    scripts:
      - name: Enable macOS desktop support
        script: |
          flutter config --enable-macos-desktop
      
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      
      - name: Build macOS app
        script: |
          flutter build macos --release
      
      - name: Bundle Playwright server into app
        script: |
          APP_PATH="build/macos/Build/Products/Release/veo3_another.app"
          PW_DIR="$APP_PATH/Contents/Resources/playwright_server"
          mkdir -p "$PW_DIR"
          
          # Copy pre-built binaries (both architectures)
          cp playwright_server/playwright_server_macos_arm64 "$PW_DIR/playwright_server_macos_arm64"
          cp playwright_server/playwright_server_macos_x64 "$PW_DIR/playwright_server_macos_x64"
          
          chmod +x "$PW_DIR"/*
          # Remove quarantine flag so Gatekeeper doesn't block on first run
          xattr -cr "$PW_DIR"/*
          echo "Bundled Playwright server:"
          ls -lah "$PW_DIR"/

      - name: Bundle FFmpeg into app
        script: |
          APP_PATH="build/macos/Build/Products/Release/veo3_another.app"
          MACOS_DIR="$APP_PATH/Contents/MacOS"
          TMPDIR_FF="/tmp/ffmpeg_bundle"
          mkdir -p "$TMPDIR_FF"
          
          echo "=== Downloading static FFmpeg binaries for macOS ==="
          
          # Install p7zip for extracting 7z archives
          brew install p7zip 2>/dev/null || true
          
          # Download static ffmpeg from evermeet.cx (universal/ARM64 static builds)
          echo "Downloading ffmpeg..."
          curl -L -o "$TMPDIR_FF/ffmpeg.7z" "https://evermeet.cx/ffmpeg/getrelease/7z" || true
          
          echo "Downloading ffprobe..."
          curl -L -o "$TMPDIR_FF/ffprobe.7z" "https://evermeet.cx/ffmpeg/getrelease/ffprobe/7z" || true
          
          # Extract and copy ffmpeg
          if [ -f "$TMPDIR_FF/ffmpeg.7z" ] && [ -s "$TMPDIR_FF/ffmpeg.7z" ]; then
            cd "$TMPDIR_FF"
            7z x -y ffmpeg.7z
            if [ -f "ffmpeg" ]; then
              cp ffmpeg "$MACOS_DIR/ffmpeg"
              chmod +x "$MACOS_DIR/ffmpeg"
              FFMPEG_SIZE=$(ls -lh "$MACOS_DIR/ffmpeg" | awk '{print $5}')
              echo "✅ Bundled ffmpeg (static): $FFMPEG_SIZE"
            else
              echo "❌ ffmpeg not found after extraction"
              ls -la "$TMPDIR_FF/"
            fi
          else
            echo "❌ ffmpeg download failed or empty"
          fi
          
          # Extract and copy ffprobe
          if [ -f "$TMPDIR_FF/ffprobe.7z" ] && [ -s "$TMPDIR_FF/ffprobe.7z" ]; then
            cd "$TMPDIR_FF"
            7z x -y ffprobe.7z
            if [ -f "ffprobe" ]; then
              cp ffprobe "$MACOS_DIR/ffprobe"
              chmod +x "$MACOS_DIR/ffprobe"
              FFPROBE_SIZE=$(ls -lh "$MACOS_DIR/ffprobe" | awk '{print $5}')
              echo "✅ Bundled ffprobe (static): $FFPROBE_SIZE"
            else
              echo "❌ ffprobe not found after extraction"
            fi
          else
            echo "❌ ffprobe download failed or empty"
          fi
          
          # Remove quarantine flags
          xattr -cr "$MACOS_DIR/ffmpeg" 2>/dev/null || true
          xattr -cr "$MACOS_DIR/ffprobe" 2>/dev/null || true
          
          # Cleanup
          rm -rf "$TMPDIR_FF"
          
          echo "=== FFmpeg binaries in app bundle ==="
          ls -lah "$MACOS_DIR/ffmpeg" "$MACOS_DIR/ffprobe" 2>/dev/null || echo "Missing!"

      - name: Rename and package app
        script: |
          cd build/macos/Build/Products/Release
          if [ -d "veo3_another.app" ]; then
            mv veo3_another.app "$APP_NAME.app"
          fi
          zip -r -y "$APP_NAME.zip" "$APP_NAME.app"
    
    artifacts:
      - build/macos/Build/Products/Release/*.app
      - build/macos/Build/Products/Release/*.zip
    
    publishing:
      email:
        recipients:
          - bdhshakilbd@gmail.com
        notify:
          success: true
          failure: true

  # Combined iOS + macOS Build (runs both)
  all-platforms:
    name: Build iOS + macOS
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.yourcompany.veo3another"
        APP_NAME: "Veo3 Another"
    
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      
      # iOS Build
      - name: Install iOS CocoaPods
        script: |
          find . -name "Podfile" -execdir pod install \;
      
      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
      
      # macOS Build
      - name: Enable macOS support
        script: |
          flutter config --enable-macos-desktop
      
      - name: Build macOS
        script: |
          flutter build macos --release
      
      - name: Package macOS
        script: |
          cd build/macos/Build/Products/Release
          mv veo3_another.app "$APP_NAME.app" || true
          zip -r "$APP_NAME-macOS.zip" "$APP_NAME.app"
    
    artifacts:
      - build/ios/iphoneos/*.app
      - build/macos/Build/Products/Release/*.app
      - build/macos/Build/Products/Release/*.zip
    
    publishing:
      email:
        recipients:
          - bdhshakilbd@gmail.com
        notify:
          success: true
          failure: true
